version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/eljonp"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Singapore"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "deps"
    groups:
      npm-production-minor-patch:
        dependency-type: "production"
        update-types:
          - "minor"
          - "patch"
        patterns:
          - "*"
      npm-development-minor-patch:
        dependency-type: "development"
        update-types:
          - "minor"
          - "patch"
        patterns:
          - "*"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Singapore"
    commit-message:
      prefix: "deps"
    groups:
      github-actions:
        patterns:
          - "*"
